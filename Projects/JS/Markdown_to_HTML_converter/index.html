<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Responsive design support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Markdown Converter</title>

  <!-- Google Font-->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!--  HEADER -->
<header>

  <h1>Markdown → HTML Converter</h1>

  
</header>


<!-- MAIN CONTAINER -->
<div class="container">


  <!--  Markdown Input Section -->
  <div class="card">

    <h2>Markdown Input</h2>

    <!-- User markdown input -->
    <textarea 
      id="markdown-input"
      placeholder="Write markdown here... Example: # Hello">
    </textarea>

    <!-- Buttons -->
    <div class="buttons">

      <button id="convert-btn">
        Convert
      </button>

      <button id="clear-btn">
        Clear
      </button>

    </div>

  </div>



  <!--Raw HTML Output  -->
  <div class="card">

    <h2>HTML Code</h2>

    <!-- Converted HTML code -->
    <pre id="html-output"></pre>

    <!-- Copy Button -->
    <button id="copy-btn">
      Copy HTML
    </button>

  </div>



  <!--  Preview Section  -->
  <div class="card">

    <h2>Live Preview</h2>

    <!-- Browser rendered HTML -->
    <div id="preview"></div>

  </div>

</div>


<!-- Footer -->
<footer>
  <p>Made by Hafizur Rahman</p>
</footer>


<!-- JavaScript File -->
<script src="script.js"></script>

</body>
</html>
